<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>Lexophile options</title>
		<style>
			body {
				font: 14px/1.4 -apple-system, system-ui, sans-serif;
				padding: 20px;
				width: 360px;
				color: #222;
			}
			h1 {
				font-size: 16px;
				margin: 0 0 16px;
			}
			label {
				display: block;
				margin-top: 14px;
				font-weight: 600;
			}
			.hint {
				font-weight: 400;
				color: #666;
				font-size: 12px;
				margin-top: 2px;
			}
			input[type='text'],
			input[type='password'] {
				width: 100%;
				margin-top: 4px;
				padding: 6px 8px;
				border: 1px solid #ccc;
				border-radius: 4px;
				font: inherit;
				box-sizing: border-box;
			}
			.row {
				display: flex;
				gap: 8px;
				align-items: center;
				margin-top: 18px;
			}
			button {
				padding: 6px 14px;
				border: 1px solid #ccc;
				background: #f5f5f5;
				border-radius: 4px;
				cursor: pointer;
				font: inherit;
			}
			button.primary {
				background: #7d53dc;
				color: #fff;
				border-color: #7d53dc;
			}
			.status {
				font-size: 12px;
				color: #666;
			}
			.status.ok {
				color: #7d53dc;
			}
			.status.err {
				color: #b00020;
			}
		</style>
	</head>
	<body>
		<h1>Lexophile</h1>

		<label>
			Obsidian server URL
			<div class="hint">Where the Lexophile plugin is listening. Default: http://127.0.0.1:27124</div>
			<input id="serverUrl" type="text" placeholder="http://127.0.0.1:27124" />
		</label>

		<label>
			API token
			<div class="hint">Must match the token in Obsidian → Settings → Lexophile.</div>
			<input id="apiToken" type="password" placeholder="leave blank to disable auth" />
		</label>

		<div class="row">
			<button id="save" class="primary">Save</button>
			<button id="test">Test connection</button>
			<span id="status" class="status"></span>
		</div>

		<script src="options.js"></script>
	</body>
</html>
